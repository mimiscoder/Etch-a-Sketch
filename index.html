<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Etch-a-Sketch</h1>

    <div class="container">
        
    </div>
    <div class="grid-controls">
        <h2>Grid Control Buttons</h2>
        <button class="resize-grid-btn">Resize Grid</button>
        <button class="clear-grid-btn">Clear Grid</button>
    </div>
    <div class="drawing-modes">
        <h2>Drawing Modes</h2>
        <button class="black-pen-btn">Black Pen</button>
        <button class="rainbow-btn">Rainbow Mode</button>
        <button class="shade-btn">Shade Mode</button>
    </div>
</body>
</html>
